spring.application.name=propex

server.port=8081


spring.datasource.url=jdbc:postgresql://localhost:5432/propex
spring.datasource.username=postgres
spring.datasource.password=1010

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF


spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false


# Looks like you commited the postgres password and the JWT secret directly into the code. You really need to pull these out into env vars (like `${DB_PASSWORD}`) before this goes anywhere near production, otherwise they'll stuck in your git history forever.
jwt.secret=6A576E5A7234753778217A25432A462D4A614E645267556B5870327335763879
jwt.expiration=36000000

file.upload-dir=uploads/company-docs
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.server.port=8081

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.property.management.propex=DEBUG

