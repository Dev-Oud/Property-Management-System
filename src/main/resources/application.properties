spring.application.name=propex
# -----------------------------
# SERVER CONFIG
# -----------------------------
server.port=8081

# -----------------------------
# DATABASE CONFIG
# -----------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/propex
spring.datasource.username=postgres
spring.datasource.password=1010

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -----------------------------
# JSON SERIALIZATION
# -----------------------------
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# -----------------------------
# CORS (optional - will add in config later too)
# -----------------------------
# spring.web.cors.allowed-origins=http://localhost:5500
# JWT Configuration
jwt.secret=your-256-bit-secret-key-should-be-very-long-and-random
jwt.expiration=86400000  # 1 day in milliseconds


# -----------------------------
# JWT CONFIG (you’ll use later)
# -----------------------------

